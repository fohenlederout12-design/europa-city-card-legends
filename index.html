<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUROPA CITY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
overflow:hidden;
color:white;
}

/* CINÉMATIQUE */

#cinematic{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#0b1c3d,#000);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
}

#logo{
font-size:70px;
color:#55c8ff;
text-shadow:0 0 30px #55c8ff;
animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

#text1{
margin-top:30px;
font-size:25px;
opacity:0;
animation:show1 2s forwards;
animation-delay:1s;
}

#text2{
margin-top:20px;
font-size:25px;
opacity:0;
animation:show2 2s forwards;
animation-delay:3s;
}

@keyframes show1{
100%{
opacity:1;
}
}

@keyframes show2{
100%{
opacity:1;
}
}

/* MAP */

#city{
display:none;
width:100vw;
height:100vh;
background:
linear-gradient(#081221,#0d2342);
justify-content:center;
align-items:center;
flex-direction:column;
}

#title{
font-size:50px;
color:#55c8ff;
text-shadow:0 0 20px #55c8ff;
}

#soon{
margin-top:30px;
font-size:25px;
}

</style>
</head>
<body>

<div id="cinematic">

<div id="logo">
🌍 EUROPA
</div>

<div id="text1">
UNE LÉGENDE NE NAÎT PAS...
</div>

<div id="text2">
ELLE SE CONSTRUIT.
</div>

</div>

<div id="city">

<div id="title">
EUROPA CITY
</div>

<div id="soon">
🚧 Construction de la ville...
</div>

</div>

<script>

setTimeout(()=>{

document.getElementById("cinematic").style.display="none";

document.getElementById("city").style.display="flex";

},6000);

</script>

</body>
</html>
